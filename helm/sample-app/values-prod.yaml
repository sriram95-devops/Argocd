# helm/sample-app/values-prod.yaml
replicaCount: 3
image:
  repository: nginx
  tag: "1.2.0"   # prod lags staging intentionally
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi