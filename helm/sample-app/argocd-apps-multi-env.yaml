# argocd-apps-multi-env.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-app-dev
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/your-org/devops-final-project.git
    targetRevision: main
    path: helm/sample-app
    helm:
      valueFiles: [values.yaml, values-dev.yaml]
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions: [CreateNamespace=true]
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-app-staging
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/your-org/devops-final-project.git
    targetRevision: main
    path: helm/sample-app
    helm:
      valueFiles: [values.yaml, values-staging.yaml]
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions: [CreateNamespace=true]
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-app-prod
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/your-org/devops-final-project.git
    targetRevision: main
    path: helm/sample-app
    helm:
      valueFiles: [values.yaml, values-prod.yaml]
  destination:
    server: https://kubernetes.default.svc   # separate production cluster
    namespace: prod
  syncPolicy:
    syncOptions: [CreateNamespace=true]
    # No automated sync for prod — manual approval required
