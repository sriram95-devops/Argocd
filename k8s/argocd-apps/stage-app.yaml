apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: your-app-stage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sriram95-devops/Argocd.git
    targetRevision: HEAD
    path: k8s/stage
  destination:
    server: https://kubernetes.default.svc
    namespace: stage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
